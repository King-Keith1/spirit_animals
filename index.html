<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit Animal Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Spirit_Animal.css">
</head>
<body>
    <div id="page-aura"></div>
    <div id="quiz-container">
        <div id="quiz-header">
            <p id="quiz-eyebrow">Two ways to know yourself</p>
            <h1 id="quiz-title">Spirit &amp; Type</h1>
        </div>
        <div id="progress-bar-track">
            <div id="progress-bar-fill"></div>
        </div>
        <div id="question-panel">
            <p id="question-text"></p>
            <div id="answer-options"></div>
            <div id="quiz-nav">
                <button id="back-btn" type="button">Back</button>
                <button id="next-btn" type="button" disabled>Next</button>
            </div>
        </div>
    </div>
    <div id="result-container"></div>
    <script src="Spirit_Ani.js"></script>

</html>
